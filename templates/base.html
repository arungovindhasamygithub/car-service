<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoWorks</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Core Theme Variables */
        :root {
            --bg-main: #1d1d1f;
            --accent-red: #d33c44;
            --text-main: #ffffff;
            --font-primary: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        main {
            flex: 1;
            position: relative;
        }

        /* Flash Messages */
        .alert-dark-theme {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-left: 4px solid var(--accent-red);
        }

        /* Simple Footer */
        .simple-footer {
            background-color: #111;
            border-top: 1px solid #222;
            padding: 20px 0;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="container mt-4 position-absolute top-0 start-50 translate-middle-x" style="z-index: 1000; width: 90%; max-width: 600px;">
                    {% for category, message in messages %}
                        <div class="alert alert-dark-theme alert-dismissible fade show shadow" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Auto-dismiss flash alerts after 5 seconds
        setTimeout(function() {
            $('.alert').fadeOut('slow');
        }, 5000);
    </script>
</body>
</html>
